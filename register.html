<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - NEXCORE</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html#hero" class="nav-logo">NEX<span>CORE</span></a>
      <nav class="nav-links auth-nav">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="login.html" class="nav-cta">Iniciar sesi&oacute;n</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="section auth-section">
      <div class="section-inner auth-shell">
        <div class="auth-copy">
          <span class="section-label">- Acceso seguro</span>
          <h1 class="section-title">Crear cuenta <em>NEXCORE</em></h1>
          <p class="section-sub">Registra tus datos para acceder al panel privado de infraestructura.</p>
        </div>

        <form class="contact-form auth-form" action="/api/register" method="post">
          <div class="form-alert" role="alert" aria-live="polite"></div>

          <div class="form-group">
            <label for="first_name" class="form-label">Nombre</label>
            <input type="text" id="first_name" name="first_name" class="form-input" maxlength="80" minlength="2" autocomplete="given-name" required />
          </div>

          <div class="form-group">
            <label for="last_name" class="form-label">Apellido</label>
            <input type="text" id="last_name" name="last_name" class="form-input" maxlength="80" minlength="2" autocomplete="family-name" required />
          </div>

          <div class="form-group">
            <label for="email" class="form-label">Correo electr&oacute;nico</label>
            <input type="email" id="email" name="email" class="form-input" maxlength="150" autocomplete="email" required />
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Contrase&ntilde;a</label>
            <input type="password" id="password" name="password" class="form-input" autocomplete="new-password" minlength="8" required />
          </div>

          <div class="form-group">
            <label for="password_confirmation" class="form-label">Confirmar contrase&ntilde;a</label>
            <input type="password" id="password_confirmation" name="password_confirmation" class="form-input" autocomplete="new-password" minlength="8" required />
          </div>

          <button type="submit" class="btn-primary btn-submit">Crear cuenta -&gt;</button>
        </form>
      </div>
    </section>
  </main>
  <script type="module" src="js/app.js"></script>
</body>
</html>
