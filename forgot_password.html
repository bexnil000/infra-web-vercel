<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contrase&ntilde;a - NEXCORE</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html#hero" class="nav-logo">NEX<span>CORE</span></a>
      <nav class="nav-links auth-nav">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="login.html" class="nav-cta">Iniciar sesi&oacute;n</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="section auth-section">
      <div class="section-inner auth-shell">
        <div class="auth-copy">
          <span class="section-label">- Recuperaci&oacute;n</span>
          <h1 class="section-title">Olvid&eacute; mi <em>contrase&ntilde;a</em></h1>
          <p class="section-sub">Te enviaremos un enlace temporal para crear una nueva contrase&ntilde;a.</p>
        </div>

        <form class="contact-form auth-form" action="/api/forgot-password" method="post">
          <div class="form-alert" role="alert" aria-live="polite"></div>
          <div class="form-group">
            <label for="email" class="form-label">Correo electr&oacute;nico</label>
            <input type="email" id="email" name="email" class="form-input" maxlength="150" autocomplete="email" required />
          </div>
          <button type="submit" class="btn-primary btn-submit">Enviar enlace -&gt;</button>
        </form>
      </div>
    </section>
  </main>
  <script type="module" src="js/app.js"></script>
</body>
</html>
