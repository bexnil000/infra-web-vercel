<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesi&oacute;n - NEXCORE</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html#hero" class="nav-logo">NEX<span>CORE</span></a>
      <nav class="nav-links auth-nav">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="register.html" class="nav-cta">Registrarse</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="section auth-section">
      <div class="section-inner auth-shell">
        <div class="auth-copy">
          <span class="section-label">- Sesi&oacute;n privada</span>
          <h1 class="section-title">Entrar al <em>panel</em></h1>
          <p class="section-sub">Accede con tu correo y contrase&ntilde;a para consultar el &aacute;rea privada.</p>
        </div>

        <form class="contact-form auth-form" action="/api/login" method="post">
          <div class="form-alert" role="alert" aria-live="polite"></div>

          <div class="form-group">
            <label for="email" class="form-label">Correo electr&oacute;nico</label>
            <input type="email" id="email" name="email" class="form-input" maxlength="150" autocomplete="email" required />
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Contrase&ntilde;a</label>
            <input type="password" id="password" name="password" class="form-input" autocomplete="current-password" required />
          </div>

          <label class="auth-checkbox" for="remember">
            <input type="checkbox" id="remember" name="remember" value="1" />
            <span>Recordar usuario</span>
          </label>

          <a href="forgot_password.html" class="auth-link">Olvid&eacute; mi contrase&ntilde;a</a>

          <button type="submit" class="btn-primary btn-submit">Iniciar sesi&oacute;n -&gt;</button>
        </form>
      </div>
    </section>
  </main>
  <script type="module" src="js/app.js"></script>
</body>
</html>
