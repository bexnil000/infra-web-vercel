<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de usuario - NEXCORE</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html#hero" class="nav-logo">NEX<span>CORE</span></a>
      <nav class="nav-links auth-nav">
        <a href="index.html" class="nav-link">Inicio</a>
        <button type="button" class="nav-cta" data-logout>Cerrar sesi&oacute;n</button>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="section auth-section">
      <div class="section-inner dashboard-shell">
        <span class="section-label">- Panel protegido</span>
        <h1 class="section-title">Mi cuenta <em>NEXCORE</em></h1>
        <p class="section-sub">Consulta y actualiza la informaci&oacute;n de tu perfil.</p>

        <div class="metrics-grid dashboard-grid">
          <div class="metric-card">
            <span class="metric-label">Nombre</span>
            <span class="dashboard-email" data-user-name>Cargando...</span>
            <span class="metric-sub">Usuario autenticado</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">Correo</span>
            <span class="dashboard-email" data-user-email>Cargando...</span>
            <span class="metric-sub">Correo registrado</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">Fecha de registro</span>
            <span class="dashboard-email" data-user-created>Cargando...</span>
            <span class="metric-sub">Alta en la plataforma</span>
          </div>
        </div>

        <form class="contact-form dashboard-form" action="/api/profile" method="post">
          <div class="form-alert" role="alert" aria-live="polite"></div>

          <div class="dashboard-form-grid">
            <div class="form-group">
              <label for="first_name" class="form-label">Nombre</label>
              <input type="text" id="first_name" name="first_name" class="form-input" maxlength="80" minlength="2" autocomplete="given-name" required />
            </div>

            <div class="form-group">
              <label for="last_name" class="form-label">Apellido</label>
              <input type="text" id="last_name" name="last_name" class="form-input" maxlength="80" minlength="2" autocomplete="family-name" required />
            </div>
          </div>

          <div class="dashboard-form-grid">
            <div class="form-group">
              <label for="current_password" class="form-label">Contrase&ntilde;a actual</label>
              <input type="password" id="current_password" name="current_password" class="form-input" autocomplete="current-password" />
            </div>

            <div class="form-group">
              <label for="new_password" class="form-label">Nueva contrase&ntilde;a</label>
              <input type="password" id="new_password" name="new_password" class="form-input" autocomplete="new-password" minlength="8" />
            </div>
          </div>

          <div class="form-group">
            <label for="password_confirmation" class="form-label">Confirmar nueva contrase&ntilde;a</label>
            <input type="password" id="password_confirmation" name="password_confirmation" class="form-input" autocomplete="new-password" minlength="8" />
          </div>

          <button type="submit" class="btn-primary btn-submit">Guardar cambios -&gt;</button>
        </form>
      </div>
    </section>
  </main>
  <script type="module" src="js/app.js"></script>
</body>
</html>
